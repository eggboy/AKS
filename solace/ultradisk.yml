kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: ultra-disk-sc
provisioner: disk.csi.azure.com
volumeBindingMode: WaitForFirstConsumer
parameters:
  skuname: UltraSSD_LRS
  kind: managed
  cachingMode: None
  diskIopsReadWrite: "5000"   # per-disk max = min(300*GiB, 160000); 5000 needs >=17 GiB disk
  diskMbpsReadWrite: "200"    # per-disk max = 4000 MBps; sized to fit default broker PVC and D8s_v5 VM disk cap
